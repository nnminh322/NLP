  3. In some cases, the answer may say that it cannot answer the question. Or it could be that you cannot successfully locate the final formula.
     In those cases, respond simply with "None".
  4. Pay attention: the leading phrase "Final formula: " usually will appear in the answer that is given to you, but it should NOT appear in YOUR output.

