  Example 1:
  - Input:
    Question: wie hoch war die Spannweite der Volatilität (%) in der Black-Scholes-Berechnung für den Dreijahreszeitraum?
    Context:
      ... und Tochtergesellschaften, Anhang zu den konsolidierten Finanzberichten 2014 (fortgesetzt), Anmerkung 12.
      Aktienbezogene Vergütungen (fortgesetzt) Die Vergütungskosten, die für das ESPP des Unternehmens erfasst wurden, beliefen sich für die Jahre zum 31. März 2009, 2008 und 2007 auf jeweils 0,1 Millionen US-Dollar.
      Der beizulegende Zeitwert der im Rahmen des Aktienkaufplans ausgegebenen Aktien wurde zu Beginn jeder Angebotsperiode unter Verwendung des Black-Scholes-Optionspreismodells mit folgenden Annahmen geschätzt: ._|    |                         | 2009             | 2008             | 2007             |
      |---:|:---------------------------|:-----------------|:-----------------|:-----------------|
      |  0 | risikofreier Zinssatz      | 1,01% ( 1,01 % ) | 4,61% ( 4,61 % ) | 4,84% ( 4,84 % ) |
      |  1 | erwartete Laufzeit (Jahre) | 0,5              | 0,5              | 0,5              |
      |  2 | erwartete Volatilität      | 67,2% ( 67,2 % ) | 45,2% ( 45,2 % ) | 39,8% ( 39,8 % ) |_note 13 .
      Grundkapital: Im August 2008 gab das Unternehmen 2.419.932 Stammaktien zu einem Preis von 17,3788 USD in einem öffentlichen Angebot aus, was nach Abzug der Angebotskosten zu einem Nettoerlös von etwa 42,0 Millionen USD für das Unternehmen führte.
      Im März 2007 gab das Unternehmen 5.000.000 Stammaktien in einem öffentlichen Angebot aus, und im April 2007 wurden zusätzlich 80.068 Stammaktien im Zusammenhang mit der teilweisen Ausübung der Mehrzuteilungsoption der Konsortialbanken ausgegeben.
      Das Unternehmen hat 1.000.000 Vorzugsaktien der Klasse B mit einem Nennwert von 0,01 USD autorisiert, deren Bezeichnung, Rechte und Privilegien vom Vorstand festgelegt werden können.
      Es wurden keine Vorzugsaktien der Klasse B ausgegeben oder sind ausstehend.
  - Output:
    1. Reasoning:
      - Um die Spannweite der Volatilität für die Black-Scholes-Berechnung für den Dreijahreszeitraum zu berechnen, müssen wir die in der Tabelle für jedes Jahr angegebenen erwarteten Volatilitätswerte betrachten.
      - Die erwarteten Volatilitätswerte sind in der Tabelle in der Zeile "erwartete Volatilität" angegeben.
      - Um die Spannweite der Volatilität zu finden, müssen wir den niedrigsten Wert vom höchsten Wert subtrahieren.
      - Spannweite der Volatilität = subtract(Höchster Wert, Niedrigster Wert)
      - höchster_Wert = den höchsten Wert in der Tabelle finden und als Konstante verwenden = 67.2
      - niedrigster_Wert = den minimalen Wert in der Tabelle finden und als Konstante verwenden = 39.8
    2. Final Answer:
      "Final formula: subtract(67.2, 39.8)"

  Example 2:
  - Input:
    Question: wie viel Prozent der gesperrten Aktien sollen nach 2021 freigegeben werden?
    Context:
      ... der intrinsische Wert der während der Jahre zum 31. Dezember 2016, 2015 und 2014 freigegebenen gesperrten Aktien betrug 25 Millionen USD, 31 Millionen USD bzw. 17 Millionen USD.
      Den Mitarbeitern gewährte gesperrte Aktien haben Vesting-Perioden, die von 1 Jahr mit variablen Vesting-Daten bis zu 10 Jahren reichen.
      Nachfolgend eine Zusammenfassung der zukünftigen Vesting-Perioden unserer ausstehenden gesperrten Aktien: Vesting der gesperrten Aktien ._|    | year              |   vesting of restricted shares |
      |---:|:------------------|-------------------------------:|
      |  0 | 2017              |                        1476832 |
      |  1 | 2018              |                        2352443 |
      |  2 | 2019              |                        4358728 |
      |  3 | 2020              |                         539790 |
      |  4 | 2021              |                         199850 |
      |  5 | danach            |                         110494 |
      |  6 | insgesamt         |                        9038137 |_Die damit verbundenen Vergütungskosten abzüglich geschätzter Verfallbeträge werden in der Regel gleichmäßig über die Vesting-Periode der gesperrten Aktienaufträge erfasst.
      Bei Vesting werden die Zuteilungen in unseren Stammaktien der Klasse P ausgezahlt.
      Im Jahr 2016, 2015 und 2014 erfassten wir jeweils 66 Millionen USD, 52 Millionen USD und 51 Millionen USD an Aufwendungen im Zusammenhang mit gesperrten Aktienaufträgen und kapitalisierten jeweils etwa 9 Millionen USD, 15 Millionen USD und 6 Millionen USD.
      Am 31. Dezember 2016 und 2015 betrugen die nicht erfassten Vergütungskosten für gesperrte Aktienaufträge abzüglich geschätzter Verfallbeträge jeweils etwa 133 Millionen USD bzw. 154 Millionen USD.
      Pensions- und andere Altersvorsorgepläne: Wir unterhalten einen beitragsorientierten Plan, der berechtigte US-amerikanische Mitarbeiter abdeckt.
  - Output:
    1. Reasoning:
      - Um den Prozentsatz der gesperrten Aktien zu bestimmen, die nach 2021 freigegeben werden sollen, müssen wir die Tabelle "Vesting der gesperrten Aktien" im Kontext betrachten.
      - Um den Prozentsatz zu finden, teilen wir die Anzahl der Aktien, die nach 2021 freigegeben werden, durch die insgesamt ausstehenden gesperrten Aktien und multiplizieren das Ergebnis mit 100.
      - Prozentsatz = multiply(divide(Anzahl nach 2021, Gesamtzahl), 100)
      - Anzahl nach 2021 = 110494
      - Gesamtzahl = 9038137
    2. Final Answer:
      "Final formula: multiply(divide(110494, 9038137), 100)"

